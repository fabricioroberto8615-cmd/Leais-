<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalCall - Videochamada Simples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Cabeçalho */
        header {
            background-color: #1f1f1f;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #333;
        }

        /* Área dos Vídeos */
        .video-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            padding: 20px;
            position: relative;
        }

        @media (min-width: 768px) {
            .video-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .video-box {
            background-color: #2a2a2a;
            border-radius: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #444;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-label {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* Painel de Controle */
        .controls {
            background-color: #1f1f1f;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 2px solid #333;
        }

        .btn {
            background-color: #333;
            border: none;
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #444;
        }

        .btn-end {
            background-color: #ff3b30;
        }

        .btn-end:hover {
            background-color: #ff453a;
        }

        .btn-active {
            background-color: #007aff;
        }
    </style>
</head>
<body>

    <header>
        🌐 GlobalCall — Conectando você ao mundo
    </header>

    <div class="video-container">
        <div class="video-box">
            <div class="user-label">Amigo Conectado 🌍</div>
            <div style="color: #888;">Aguardando conexão...</div>
        </div>
        
        <div class="video-box">
            <div class="user-label">Você (Sua Câmera) 👤</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-active" id="micBtn" onclick="toggleMic()">🎤</button>
        <button class="btn btn-active" id="camBtn" onclick="toggleCam()">📷</button>
        <button class="btn btn-end" onclick="encerrarChama()">📞</button>
    </div>

    <script>
        // Função simples para pedir permissão e mostrar a câmera do próprio usuário
        async function iniciarCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const videoElement = document.getElementById('localVideo');
                videoElement.srcObject = stream;
            } catch (error) {
                console.error("Erro ao acessar câmera/microfone:", error);
                alert("Por favor, permita o acesso à câmera para usar o app.");
            }
        }

        // Alternar Microfone (Simulação visual)
        function toggleMic() {
            const btn = document.getElementById('micBtn');
            btn.classList.toggle('btn-active');
            // Aqui entraria a lógica para mutar o áudio real
        }

        // Alternar Câmera (Simulação visual)
        function toggleCam() {
            const btn = document.getElementById('camBtn');
            btn.classList.toggle('btn-active');
            // Aqui entraria a lógica para desligar o vídeo real
        }

        function encerrarChama() {
            alert("Chamada encerrada!");
            window.location.reload();
        }

        // Inicia a câmera assim que a página carrega
        window.onload = iniciarCamera;
    </script>

</body>
</html>
